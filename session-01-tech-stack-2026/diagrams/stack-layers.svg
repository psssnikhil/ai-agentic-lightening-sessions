<svg viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <text x="490" y="34" text-anchor="middle" font-size="26" font-weight="700" fill="#1E293B">The same components, seen as a stack</text>
  <text x="490" y="60" text-anchor="middle" font-size="14.5" fill="#64748B">A pipeline left→right; a stack bottom→top. The app sits on layers of capability.</text>

  <!-- layers (bottom = model, top = app) -->
  <g font-size="13">
    <rect x="120" y="96" width="620" height="52" rx="10" fill="#E0E7FF" stroke="#6366F1"/><text x="140" y="127" font-size="15" font-weight="700" fill="#312E81">Application / Harness</text><text x="720" y="127" text-anchor="end" font-size="12" fill="#475569">Claude Code, Cursor, your app, a UI</text>
    <rect x="120" y="156" width="620" height="52" rx="10" fill="#EEF2FF" stroke="#6366F1"/><text x="140" y="187" font-size="15" font-weight="700" fill="#3730A3">Orchestration</text><text x="720" y="187" text-anchor="end" font-size="12" fill="#475569">the control loop; single- or multi-agent</text>
    <rect x="120" y="216" width="620" height="52" rx="10" fill="#FEF3C7" stroke="#F59E0B"/><text x="140" y="247" font-size="15" font-weight="700" fill="#92400E">Guardrails + Human-in-the-loop</text><text x="720" y="247" text-anchor="end" font-size="12" fill="#78350F">approvals, budgets, policy, validation</text>
    <rect x="120" y="276" width="620" height="52" rx="10" fill="#F0FDFA" stroke="#14B8A6"/><text x="140" y="307" font-size="15" font-weight="700" fill="#0F766E">Tools &amp; Integrations</text><text x="720" y="307" text-anchor="end" font-size="12" fill="#475569">function calling, MCP, APIs, code exec</text>
    <rect x="120" y="336" width="620" height="52" rx="10" fill="#F0FDFA" stroke="#14B8A6"/><text x="140" y="367" font-size="15" font-weight="700" fill="#0F766E">Memory + Context</text><text x="720" y="367" text-anchor="end" font-size="12" fill="#475569">history, vector store, retrieval</text>
    <rect x="120" y="396" width="620" height="52" rx="10" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5"/><text x="140" y="427" font-size="15" font-weight="700" fill="#0F766E">Model / Reasoning (the foundation)</text><text x="720" y="427" text-anchor="end" font-size="12" fill="#475569">Claude, GPT, Gemini, open models</text>
  </g>

  <!-- observability spine on the right -->
  <rect x="756" y="96" width="104" height="352" rx="12" fill="#FCE7F3" stroke="#EC4899"/>
  <text x="808" y="255" text-anchor="middle" font-size="14" font-weight="700" fill="#9D174D" transform="rotate(90 808 255)">Observability / AgentOps</text>
  <text x="808" y="285" text-anchor="middle" font-size="11" fill="#831843" transform="rotate(90 808 285)">traces every layer</text>

  <text x="490" y="486" text-anchor="middle" font-size="13.5" fill="#334155">Swap any layer independently — a better model, a new tool, a stricter guardrail — without rewriting the rest.</text>
  <text x="490" y="514" text-anchor="middle" font-size="12.5" fill="#64748B" font-style="italic">Observability isn't a layer — it wraps the whole stack, because you must see across all of it.</text>
</svg>
