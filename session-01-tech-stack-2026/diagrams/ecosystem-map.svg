<svg viewBox="0 0 1020 600" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <text x="510" y="32" text-anchor="middle" font-size="25" font-weight="700" fill="#1E293B">The 2026 ecosystem — representative tooling per layer</text>
  <text x="510" y="57" text-anchor="middle" font-size="13.5" fill="#64748B">Examples, not endorsements — this space moves monthly. Learn the CATEGORY; swap the tool freely.</text>

  <g font-size="11.5">
    <!-- Row 1 -->
    <rect x="20" y="76" width="238" height="150" rx="12" fill="#F0FDFA" stroke="#14B8A6" stroke-width="1.5"/><text x="36" y="100" font-size="14" font-weight="700" fill="#0F766E">Model / Reasoning</text><text x="36" y="124" fill="#334155">• Claude (Opus 4.8 · Sonnet 5 · Haiku 4.5)</text><text x="36" y="146" fill="#334155">• OpenAI GPT · Google Gemini</text><text x="36" y="168" fill="#334155">• Open weights: Llama, Mistral, Qwen</text><text x="36" y="196" fill="#64748B" font-style="italic">Pick by capability × cost × latency</text>
    <rect x="268" y="76" width="238" height="150" rx="12" fill="#F0FDFA" stroke="#14B8A6" stroke-width="1.5"/><text x="284" y="100" font-size="14" font-weight="700" fill="#0F766E">Memory / Context</text><text x="284" y="124" fill="#334155">• Vector DBs: Pinecone, Weaviate,</text><text x="284" y="140" fill="#334155">  pgvector, Chroma, Qdrant</text><text x="284" y="164" fill="#334155">• Memory: Letta (MemGPT), Zep, Mem0</text><text x="284" y="196" fill="#64748B" font-style="italic">Short-term history + long-term store</text>
    <rect x="516" y="76" width="238" height="150" rx="12" fill="#F0FDFA" stroke="#14B8A6" stroke-width="1.5"/><text x="532" y="100" font-size="14" font-weight="700" fill="#0F766E">Tools &amp; Integrations</text><text x="532" y="124" fill="#334155">• MCP (Model Context Protocol)</text><text x="532" y="146" fill="#334155">• Native function / tool calling</text><text x="532" y="168" fill="#334155">• Composio, web search, code exec</text><text x="532" y="196" fill="#64748B" font-style="italic">MCP is the emerging standard boundary</text>
    <rect x="764" y="76" width="238" height="150" rx="12" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/><text x="780" y="100" font-size="14" font-weight="700" fill="#3730A3">Orchestration</text><text x="780" y="124" fill="#334155">• LangGraph · CrewAI · MS Agent Fwk</text><text x="780" y="146" fill="#334155">• OpenAI/Claude Agent SDK · LlamaIndex</text><text x="780" y="168" fill="#334155">• Harnesses: Claude Code, Cursor</text><text x="780" y="196" fill="#64748B" font-style="italic">AutoGen now legacy (→ AG2)</text>

    <!-- Row 2 -->
    <rect x="20" y="240" width="316" height="150" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/><text x="36" y="264" font-size="14" font-weight="700" fill="#92400E">Guardrails</text><text x="36" y="288" fill="#334155">• Validation: Pydantic, JSON schema</text><text x="36" y="310" fill="#334155">• Guardrails AI · NeMo Guardrails</text><text x="36" y="332" fill="#334155">• Safety: Llama Guard · moderation APIs</text><text x="36" y="354" fill="#334155">• Permissions / sandboxing / OPA</text><text x="36" y="378" fill="#78350F" font-style="italic">Match the guardrail to the risk</text>
    <rect x="346" y="240" width="316" height="150" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/><text x="362" y="264" font-size="14" font-weight="700" fill="#92400E">Human-in-the-Loop</text><text x="362" y="288" fill="#334155">• Approval / review gates</text><text x="362" y="310" fill="#334155">• HumanLayer, custom review UIs</text><text x="362" y="332" fill="#334155">• "Propose → human approves → act"</text><text x="362" y="366" fill="#78350F" font-style="italic">Required for high-risk / irreversible</text>
    <rect x="672" y="240" width="330" height="150" rx="12" fill="#FCE7F3" stroke="#EC4899" stroke-width="1.5"/><text x="688" y="264" font-size="14" font-weight="700" fill="#9D174D">Observability / AgentOps</text><text x="688" y="288" fill="#334155">• Opik (Comet) · LangSmith · Langfuse</text><text x="688" y="310" fill="#334155">• Arize Phoenix · Braintrust · AgentOps</text><text x="688" y="332" fill="#334155">• W&amp;B Weave · Helicone · Maxim</text><text x="688" y="366" fill="#831843" font-style="italic">Traces, evals, cost &amp; latency in prod</text>
  </g>

  <rect x="20" y="406" width="982" height="66" rx="12" fill="#EEF2FF" stroke="#6366F1"/>
  <text x="40" y="432" font-size="14.5" font-weight="700" fill="#3730A3">The takeaway</text>
  <text x="40" y="454" font-size="13.5" fill="#475569">Don't memorize logos. Learn the seven CATEGORIES — they're stable. Tools churn; the shape of the stack doesn't.</text>

  <rect x="20" y="486" width="982" height="96" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="40" y="512" font-size="14" font-weight="700" fill="#334155">What we use in this series (and why)</text>
  <text x="40" y="536" font-size="13" fill="#475569">Model: <tspan font-weight="600" fill="#0F766E">Claude</tspan> (clean tool-use) · Tools/boundary: <tspan font-weight="600" fill="#0F766E">MCP</tspan> · Orchestration: a <tspan font-weight="600" fill="#3730A3">plain loop</tspan> first, then MCP + a harness</text>
  <text x="40" y="558" font-size="13" fill="#475569">Guardrails: <tspan font-weight="600" fill="#92400E">budgets + approval</tspan> · Observability/evals: <tspan font-weight="600" fill="#9D174D">LLM-as-judge + tracing</tspan></text>
  <text x="40" y="576" font-size="11.5" fill="#94A3B8" font-style="italic">Everything runs on one API key so you can follow along — the patterns transfer to any tool above.</text>
</svg>
