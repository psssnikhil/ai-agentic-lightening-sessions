<svg viewBox="0 0 1040 440" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs><marker id="cf" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94A3B8"/></marker></defs>
  <text x="520" y="34" text-anchor="middle" font-size="26" font-weight="700" fill="#1E293B">The 7 core components of an agentic system</text>
  <text x="520" y="60" text-anchor="middle" font-size="14.5" fill="#64748B">A request flows left→right through the stack. Each is a design decision.</text>

  <!-- legend -->
  <g font-size="12"><rect x="330" y="76" width="14" height="14" rx="3" fill="#14B8A6"/><text x="350" y="88" fill="#475569">Core</text><rect x="420" y="76" width="14" height="14" rx="3" fill="#6366F1"/><text x="440" y="88" fill="#475569">Control</text><rect x="520" y="76" width="14" height="14" rx="3" fill="#EC4899"/><text x="540" y="88" fill="#475569">Trust</text></g>

  <!-- 7 cards -->
  <g font-size="12" text-anchor="middle">
    <!-- helper positions: x = 20 + i*(140+5) -->
    <!-- 1 Model -->
    <rect x="20" y="110" width="136" height="230" rx="14" fill="#F0FDFA" stroke="#14B8A6" stroke-width="1.5"/><circle cx="88" cy="146" r="18" fill="#14B8A6"/><text x="88" y="151" fill="#fff" font-weight="700">🧠</text><text x="88" y="192" font-weight="700" font-size="13" fill="#0F766E">Model /</text><text x="88" y="208" font-weight="700" font-size="13" fill="#0F766E">Reasoning</text><text x="88" y="238" font-size="11" fill="#475569">the brain —</text><text x="88" y="254" font-size="11" fill="#475569">understands &amp;</text><text x="88" y="270" font-size="11" fill="#475569">decides</text>
    <rect x="165" y="110" width="136" height="230" rx="14" fill="#F0FDFA" stroke="#14B8A6" stroke-width="1.5"/><circle cx="233" cy="146" r="18" fill="#14B8A6"/><text x="233" y="151" fill="#fff" font-weight="700">💾</text><text x="233" y="192" font-weight="700" font-size="13" fill="#0F766E">Memory</text><text x="233" y="230" font-size="11" fill="#475569">recalls prior</text><text x="233" y="246" font-size="11" fill="#475569">steps, prefs,</text><text x="233" y="262" font-size="11" fill="#475569">long context</text>
    <rect x="310" y="110" width="136" height="230" rx="14" fill="#F0FDFA" stroke="#14B8A6" stroke-width="1.5"/><circle cx="378" cy="146" r="18" fill="#14B8A6"/><text x="378" y="151" fill="#fff" font-weight="700">🔧</text><text x="378" y="192" font-weight="700" font-size="13" fill="#0F766E">Tools &amp; APIs</text><text x="378" y="230" font-size="11" fill="#475569">acts on the</text><text x="378" y="246" font-size="11" fill="#475569">world: search,</text><text x="378" y="262" font-size="11" fill="#475569">code, DBs</text>
    <rect x="455" y="110" width="136" height="230" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/><circle cx="523" cy="146" r="18" fill="#6366F1"/><text x="523" y="151" fill="#fff" font-weight="700">🔀</text><text x="523" y="192" font-weight="700" font-size="13" fill="#3730A3">Orchestration</text><text x="523" y="230" font-size="11" fill="#475569">coordinates</text><text x="523" y="246" font-size="11" fill="#475569">steps, agents,</text><text x="523" y="262" font-size="11" fill="#475569">handoffs</text>
    <rect x="600" y="110" width="136" height="230" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/><circle cx="668" cy="146" r="18" fill="#F59E0B"/><text x="668" y="151" fill="#fff" font-weight="700">🛡️</text><text x="668" y="192" font-weight="700" font-size="13" fill="#92400E">Guardrails</text><text x="668" y="230" font-size="11" fill="#78350F">boundaries:</text><text x="668" y="246" font-size="11" fill="#78350F">security &amp;</text><text x="668" y="262" font-size="11" fill="#78350F">policy rules</text>
    <rect x="745" y="110" width="136" height="230" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/><circle cx="813" cy="146" r="18" fill="#F59E0B"/><text x="813" y="151" fill="#fff" font-weight="700">🧑</text><text x="813" y="192" font-weight="700" font-size="13" fill="#92400E">Human-in-</text><text x="813" y="208" font-weight="700" font-size="13" fill="#92400E">the-loop</text><text x="813" y="238" font-size="11" fill="#78350F">high-risk calls</text><text x="813" y="254" font-size="11" fill="#78350F">need review</text>
    <rect x="890" y="110" width="136" height="230" rx="14" fill="#FCE7F3" stroke="#EC4899" stroke-width="1.5"/><circle cx="958" cy="146" r="18" fill="#EC4899"/><text x="958" y="151" fill="#fff" font-weight="700">📊</text><text x="958" y="192" font-weight="700" font-size="12.5" fill="#9D174D">Observability</text><text x="958" y="208" font-weight="700" font-size="12.5" fill="#9D174D">/ AgentOps</text><text x="958" y="238" font-size="11" fill="#831843">monitor, eval,</text><text x="958" y="254" font-size="11" fill="#831843">debug in prod</text>
  </g>
  <!-- arrows between -->
  <g>
    <line x1="157" y1="225" x2="163" y2="225" stroke="#94A3B8" stroke-width="2" marker-end="url(#cf)"/>
    <line x1="302" y1="225" x2="308" y2="225" stroke="#94A3B8" stroke-width="2" marker-end="url(#cf)"/>
    <line x1="447" y1="225" x2="453" y2="225" stroke="#94A3B8" stroke-width="2" marker-end="url(#cf)"/>
    <line x1="592" y1="225" x2="598" y2="225" stroke="#94A3B8" stroke-width="2" marker-end="url(#cf)"/>
    <line x1="737" y1="225" x2="743" y2="225" stroke="#94A3B8" stroke-width="2" marker-end="url(#cf)"/>
    <line x1="882" y1="225" x2="888" y2="225" stroke="#94A3B8" stroke-width="2" marker-end="url(#cf)"/>
  </g>
  <text x="520" y="378" text-anchor="middle" font-size="13.5" fill="#334155">You rarely need all 7 on day one — but a <tspan font-weight="700" fill="#3730A3">production</tspan> agent grows into every box.</text>
  <text x="520" y="404" text-anchor="middle" font-size="12" fill="#94A3B8" font-style="italic">This whole series builds these components up, one at a time.</text>
</svg>
