<svg viewBox="0 0 1040 660" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <text x="470" y="30" text-anchor="middle" font-size="24" font-weight="700" fill="#1E293B">The 8-layer agentic AI stack — the complete view</text>
  <text x="470" y="52" text-anchor="middle" font-size="13" fill="#64748B">Zoom in on the 7 components: the fuller industry map. Read top→bottom (app on top, silicon at the base).</text>

  <!-- vertical rails note -->
  <rect x="880" y="66" width="150" height="520" rx="10" fill="#FCE7F3" stroke="#EC4899" stroke-dasharray="5 4"/>
  <text x="958" y="326" text-anchor="middle" font-size="13" font-weight="700" fill="#9D174D" transform="rotate(90 958 326)">Observability/Evals + Governance — span every layer</text>

  <!-- 8 bands, top = 8 governance -->
  <g font-size="11">
    <!-- L8 -->
    <rect x="20" y="66" width="850" height="60" rx="9" fill="#DCFCE7" stroke="#22C55E"/><rect x="20" y="66" width="46" height="60" rx="9" fill="#22C55E"/><text x="43" y="102" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">8</text><text x="78" y="88" font-size="13.5" font-weight="700" fill="#15803D">Governance</text><text x="78" y="106" fill="#475569">deploy pipelines · cost/FinOps · policy engine · privacy · audit · agent registries · trust</text><text x="78" y="121" fill="#94A3B8" font-style="italic">e.g. OPA, Guardrails AI, cloud IAM, model registries</text>
    <!-- L7 -->
    <rect x="20" y="132" width="850" height="60" rx="9" fill="#FFE4E6" stroke="#FB7185"/><rect x="20" y="132" width="46" height="60" rx="9" fill="#FB7185"/><text x="43" y="168" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">7</text><text x="78" y="154" font-size="13.5" font-weight="700" fill="#9F1239">Application</text><text x="78" y="172" fill="#475569">the agents users touch: assistants, coding, research, support, creation, platform bots</text><text x="78" y="187" fill="#94A3B8" font-style="italic">e.g. Claude Code, Cursor, Devin, Slack/Notion agents</text>
    <!-- L6 -->
    <rect x="20" y="198" width="850" height="60" rx="9" fill="#FEF3C7" stroke="#F59E0B"/><rect x="20" y="198" width="46" height="60" rx="9" fill="#F59E0B"/><text x="43" y="234" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">6</text><text x="78" y="220" font-size="13.5" font-weight="700" fill="#92400E">Memory</text><text x="78" y="238" fill="#475569">working + long-term memory, profiles, preferences, conversation &amp; tool history</text><text x="78" y="253" fill="#94A3B8" font-style="italic">e.g. Mem0, Zep (Graphiti), Letta, Cognee</text>
    <!-- L5 -->
    <rect x="20" y="264" width="850" height="60" rx="9" fill="#FCE7F3" stroke="#EC4899"/><rect x="20" y="264" width="46" height="60" rx="9" fill="#EC4899"/><text x="43" y="300" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">5</text><text x="78" y="286" font-size="13.5" font-weight="700" fill="#9D174D">Cognition</text><text x="78" y="304" fill="#475569">planning · reasoning · reflection/self-improvement · goal mgmt · error handling · feedback loop</text><text x="78" y="319" fill="#94A3B8" font-style="italic">patterns: ReAct, planner-executor, evaluator-optimizer</text>
    <!-- L4 -->
    <rect x="20" y="330" width="850" height="60" rx="9" fill="#E0F2FE" stroke="#0EA5E9"/><rect x="20" y="330" width="46" height="60" rx="9" fill="#0EA5E9"/><text x="43" y="366" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">4</text><text x="78" y="352" font-size="13.5" font-weight="700" fill="#075985">Tooling</text><text x="78" y="370" fill="#475569">function calling · RAG · vector DBs · code sandbox · browsing · plugins · knowledge base</text><text x="78" y="385" fill="#94A3B8" font-style="italic">e.g. Chroma, FAISS, pgvector, E2B, LangChain tools</text>
    <!-- L3 -->
    <rect x="20" y="396" width="850" height="60" rx="9" fill="#EEF2FF" stroke="#6366F1"/><rect x="20" y="396" width="46" height="60" rx="9" fill="#6366F1"/><text x="43" y="432" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">3</text><text x="78" y="418" font-size="13.5" font-weight="700" fill="#3730A3">Protocol</text><text x="78" y="436" fill="#475569">how agents talk to tools &amp; each other — the interoperability layer</text><text x="78" y="451" fill="#94A3B8" font-style="italic">MCP (tools) · A2A (agents) · ACP→A2A · ANP · AGORA</text>
    <!-- L2 -->
    <rect x="20" y="462" width="850" height="60" rx="9" fill="#F1F5F9" stroke="#94A3B8"/><rect x="20" y="462" width="46" height="60" rx="9" fill="#94A3B8"/><text x="43" y="498" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">2</text><text x="78" y="484" font-size="13.5" font-weight="700" fill="#334155">Agent Internet</text><text x="78" y="502" fill="#475569">multi-agent systems, agent mesh, identity, discovery, embedding stores</text><text x="78" y="517" fill="#94A3B8" font-style="italic">e.g. Pinecone, Weaviate, agent registries / directories</text>
    <!-- L1 -->
    <rect x="20" y="528" width="850" height="60" rx="9" fill="#E2E8F0" stroke="#64748B"/><rect x="20" y="528" width="46" height="60" rx="9" fill="#64748B"/><text x="43" y="564" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">1</text><text x="78" y="550" font-size="13.5" font-weight="700" fill="#334155">Infrastructure</text><text x="78" y="568" fill="#475569">compute, model APIs, storage, networking, data pipelines, monitoring</text><text x="78" y="583" fill="#94A3B8" font-style="italic">e.g. AWS/GCP/Azure, NVIDIA, S3, Airflow, Prometheus/Grafana</text>
  </g>
  <text x="470" y="628" text-anchor="middle" font-size="11.5" fill="#94A3B8" font-style="italic">8-layer model: Greg Coquillo (via Aakash Gupta &amp; Vikash Rungta). Examples/status verified against 2026 sources — see notes.</text>
</svg>
