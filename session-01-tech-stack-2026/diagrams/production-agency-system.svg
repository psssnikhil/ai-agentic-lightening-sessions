    <text x="36" y="552"><tspan font-weight="700" fill="#3730A3">4 Orchestration</tspan> supervisor pipeline � <tspan font-weight="700" fill="#92400E">5 Guardrails</tspan> budgets/policies � <tspan font-weight="700" fill="#92400E">6 HITL</tspan> PM approves ship</text>
