<svg viewBox="0 0 1100 580" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="rj" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#6366F1"/></marker>
    <marker id="rjloop" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 Z" fill="#94A3B8"/></marker>
  </defs>
  <text x="550" y="30" text-anchor="middle" font-size="22" font-weight="800" fill="#1E293B">One request, seven touchpoints</text>
  <text x="550" y="52" text-anchor="middle" font-size="13" fill="#64748B">Follow a single user ask through the stack � the loop every agent runs</text>
  <rect x="30" y="72" width="150" height="52" rx="14" fill="#0B1020"/>
  <text x="105" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">User ask</text>
  <text x="105" y="114" text-anchor="middle" font-size="10" fill="#94A3B8">"Research + draft post"</text>
  <line x1="180" y1="98" x2="218" y2="98" stroke="#6366F1" stroke-width="2.5" marker-end="url(#rj)"/>
  <ellipse cx="550" cy="300" rx="400" ry="190" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="550" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#6366F1">ORCHESTRATION LOOP � repeats until done</text>
  <g font-size="11">
    <rect x="230" y="148" width="168" height="100" rx="14" fill="#F0FDFA" stroke="#14B8A6" stroke-width="2"/>
    <circle cx="252" cy="170" r="13" fill="#14B8A6"/><text x="252" y="175" text-anchor="middle" font-size="10" font-weight="800" fill="#fff">2</text>
    <text x="314" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#0F766E">Memory</text>
    <text x="314" y="192" text-anchor="middle" fill="#475569">Loads prior turns</text>
    <text x="314" y="208" text-anchor="middle" fill="#475569">&amp; context</text>
    <text x="314" y="232" text-anchor="middle" font-size="9.5" fill="#0F766E" font-style="italic">feeds the model</text>
    <rect x="466" y="148" width="168" height="100" rx="14" fill="#F0FDFA" stroke="#14B8A6" stroke-width="2"/>
    <circle cx="488" cy="170" r="13" fill="#14B8A6"/><text x="488" y="175" text-anchor="middle" font-size="10" font-weight="800" fill="#fff">1</text>
    <text x="550" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#0F766E">Model</text>
    <text x="550" y="192" text-anchor="middle" fill="#475569">Reasons: answer</text>
    <text x="550" y="208" text-anchor="middle" fill="#475569">or call a tool?</text>
    <text x="550" y="232" text-anchor="middle" font-size="9.5" fill="#0F766E" font-style="italic">picks next action</text>
    <rect x="702" y="148" width="168" height="100" rx="14" fill="#F0FDFA" stroke="#14B8A6" stroke-width="2"/>
    <circle cx="724" cy="170" r="13" fill="#14B8A6"/><text x="724" y="175" text-anchor="middle" font-size="10" font-weight="800" fill="#fff">3</text>
    <text x="786" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#0F766E">Tools</text>
    <text x="786" y="192" text-anchor="middle" fill="#475569">Search, code,</text>
    <text x="786" y="208" text-anchor="middle" fill="#475569">APIs, sandboxes</text>
    <text x="786" y="232" text-anchor="middle" font-size="9.5" fill="#0F766E" font-style="italic">results to memory</text>
    <rect x="702" y="352" width="168" height="100" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="724" cy="374" r="13" fill="#F59E0B"/><text x="724" y="379" text-anchor="middle" font-size="10" font-weight="800" fill="#fff">5</text>
    <text x="786" y="376" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">Guardrails</text>
    <text x="786" y="396" text-anchor="middle" fill="#78350F">Step cap, budget,</text>
    <text x="786" y="412" text-anchor="middle" fill="#78350F">policy checks</text>
    <text x="786" y="436" text-anchor="middle" font-size="9.5" fill="#92400E" font-style="italic">stops runaway loops</text>
    <rect x="466" y="352" width="168" height="100" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="488" cy="374" r="13" fill="#F59E0B"/><text x="488" y="379" text-anchor="middle" font-size="10" font-weight="800" fill="#fff">6</text>
    <text x="550" y="376" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">Human-in-loop</text>
    <text x="550" y="396" text-anchor="middle" fill="#78350F">Approve risky</text>
    <text x="550" y="412" text-anchor="middle" fill="#78350F">actions first</text>
    <text x="550" y="436" text-anchor="middle" font-size="9.5" fill="#92400E" font-style="italic">gate before execute</text>
    <rect x="230" y="352" width="168" height="100" rx="14" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
    <circle cx="252" cy="374" r="13" fill="#EC4899"/><text x="252" y="379" text-anchor="middle" font-size="10" font-weight="800" fill="#fff">7</text>
    <text x="314" y="376" text-anchor="middle" font-size="13" font-weight="700" fill="#9D174D">Observability</text>
    <text x="314" y="396" text-anchor="middle" fill="#831843">Tokens, latency,</text>
    <text x="314" y="412" text-anchor="middle" fill="#831843">traces, evals</text>
    <text x="314" y="436" text-anchor="middle" font-size="9.5" fill="#9D174D" font-style="italic">trust in prod</text>
    <rect x="466" y="268" width="168" height="48" rx="14" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
    <circle cx="488" cy="290" r="13" fill="#6366F1"/><text x="488" y="295" text-anchor="middle" font-size="10" font-weight="800" fill="#fff">4</text>
    <text x="562" y="296" text-anchor="middle" font-size="13" font-weight="700" fill="#3730A3">Orchestration</text>
  </g>
  <path d="M398 198 C430 230 430 250 398 268" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#rjloop)"/>
  <path d="M634 198 C666 230 666 250 634 268" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#rjloop)"/>
  <path d="M870 248 L870 350" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#rjloop)"/>
  <path d="M702 402 L398 402" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#rjloop)"/>
  <path d="M230 402 L230 248" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#rjloop)"/>
  <rect x="920" y="260" width="150" height="52" rx="14" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
  <text x="995" y="284" text-anchor="middle" font-size="13" font-weight="700" fill="#15803D">Final answer</text>
  <text x="995" y="302" text-anchor="middle" font-size="10" fill="#166534">loop exits to user</text>
  <line x1="870" y1="198" x2="918" y2="278" stroke="#22C55E" stroke-width="2" marker-end="url(#rj)"/>
  <rect x="30" y="490" width="1040" height="58" rx="14" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="550" y="514" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">The connection story</text>
  <text x="550" y="534" text-anchor="middle" font-size="12" fill="#475569">Memory + Model + Tools = core loop. Orchestration runs it. Guardrails + HITL keep it safe. Observability makes it shippable.</text>
</svg>
